<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeremy Runge</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream:  #F6F1E8;
  --ink:    #1A140A;
  --dark:   #0E0C07;
  --accent: #B8924A;
  --muted:  #7A6A52;
  --rule:   #D6C9B0;
  --rule-dk:rgba(246,241,232,.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background:var(--dark);
  font-family:'DM Sans',sans-serif;
  color:var(--cream);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:100vh;
}

/* No nav. Intentional. */

/* MAIN */
main {
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:80px 72px;
  max-width:780px;
}

.eyebrow {
  font-size:9px; font-weight:500; letter-spacing:.22em;
  text-transform:uppercase; color:rgba(184,146,74,.5);
  margin-bottom:56px;
  display:flex; align-items:center; gap:14px;
}
.eyebrow::before { content:''; width:20px; height:1px; background:rgba(184,146,74,.3); }

.lines {
  display:flex;
  flex-direction:column;
  gap:0;
  margin-bottom:72px;
}

.line-primary {
  font-family:'Playfair Display',serif;
  font-size:clamp(42px,5.5vw,72px);
  font-weight:400;
  font-style:normal;
  color:var(--cream);
  line-height:1.1;
  letter-spacing:-.02em;
}

.line-secondary {
  font-family:'Playfair Display',serif;
  font-size:clamp(42px,5.5vw,72px);
  font-weight:400;
  font-style:italic;
  color:rgba(246,241,232,.35);
  line-height:1.1;
  letter-spacing:-.02em;
}

.line-tertiary {
  font-family:'DM Sans',sans-serif;
  font-size:clamp(14px,1.5vw,18px);
  font-weight:300;
  color:rgba(246,241,232,.3);
  line-height:1.7;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-top:32px;
}

/* CTA */
.cta-wrap { display:flex; flex-direction:column; gap:16px; }

.cta-line {
  font-size:13px; font-weight:300;
  color:rgba(246,241,232,.3);
  line-height:1.7;
  max-width:420px;
}

.cta-email {
  font-size:12px; font-weight:300;
  color:rgba(246,241,232,.2);
  margin-top:4px;
}
.cta-email a {
  color:rgba(246,241,232,.35);
  text-decoration:none;
  border-bottom:0.5px solid rgba(246,241,232,.15);
  transition:color .2s;
}
.cta-email a:hover { color:rgba(246,241,232,.6); }

.pill {
  display:inline-flex; align-items:center; gap:12px;
  padding:14px 28px;
  border:0.5px solid rgba(184,146,74,.35);
  border-radius:100px;
  font-size:11px; font-weight:500; letter-spacing:.1em;
  text-transform:uppercase; color:var(--accent);
  text-decoration:none;
  width:fit-content;
  margin-top:8px;
  transition:background .2s, border-color .2s;
}
.pill:hover {
  background:rgba(184,146,74,.08);
  border-color:rgba(184,146,74,.6);
}

/* FOOTER — minimal */
footer {
  padding:28px 72px;
  border-top:0.5px solid var(--rule-dk);
  display:flex; align-items:center; justify-content:space-between;
}
.footer-name {
  font-family:'Playfair Display',serif;
  font-size:13px; color:rgba(246,241,232,.2);
}
.footer-tagline {
  font-family:'Playfair Display',serif;
  font-size:12px; font-style:italic;
  color:rgba(246,241,232,.12);
}

.fade { opacity:0; transform:translateY(12px); transition:opacity .9s ease,transform .9s ease; }
.fade.in { opacity:1; transform:none; }
.fade-slow { opacity:0; transition:opacity 1.4s ease .4s; }
.fade-slow.in { opacity:1; }
</style>
</head>
<body>

<main>
  <div class="eyebrow fade">jeremyrunge.com/dedicated</div>

  <div class="lines">
    <div class="line-primary fade">You. Winning.</div>
    <div class="line-secondary fade">Me there to ensure it.</div>
    <div class="line-tertiary fade">Coaching. Confidence. Full discretion.</div>
  </div>

  <div class="cta-wrap fade-slow">
    <p class="cta-line">This conversation starts with a direct message. Nothing public. Nothing formal. Just a note.</p>
    <a href="sms:+17192381094&body=Hi%20Jeremy.%20Interested%20in%20your%20dedicated%20option." class="pill">Send a text →</a>
    <p class="cta-email"><span class="obfuscated" data-user="jeremy" data-domain="jeremyrunge.com" data-subject="Dedicated%20Engagement" data-label="Prefer email?"></span></p>
  </div>
</main>

<footer class="fade-slow">
  <div class="footer-name">Jeremy Runge</div>
  <div class="footer-tagline">The work of being.</div>
</footer>

<script>
// Email obfuscation — assembles address client-side, invisible to scrapers
document.querySelectorAll('.obfuscated').forEach(el => {
  const user = el.dataset.user;
  const domain = el.dataset.domain;
  const subject = el.dataset.subject || '';
  const label = el.dataset.label || (user + '@' + domain);
  const a = document.createElement('a');
  a.href = 'mailto:' + user + '@' + domain + (subject ? '?subject=' + subject : '');
  a.textContent = label;
  el.replaceWith(a);
});

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); obs.unobserve(e.target); } });
}, {threshold:0.05});
document.querySelectorAll('.fade, .fade-slow').forEach(el => obs.observe(el));
</script>
</body>
</html>
