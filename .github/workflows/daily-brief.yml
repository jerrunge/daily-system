name: Daily Brief — 6:20am PT

on:
  schedule:
    - cron: '20 13 * * *'   # 6:20am PT (13:20 UTC). Notion auto-updates at 6am PT; 20-min buffer.
  workflow_dispatch:          # Manual trigger: Actions → Run workflow

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate daily-data.json
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, requests, datetime, os, sys

          LINEAR_KEY   = os.environ.get('LINEAR_API_KEY', '')
          NOTION_TOKEN = os.environ.get('NOTION_TOKEN', '')
          CONTENT_DB   = 'a3261061-28fc-4e70-a90b-32d8a7ce90d1'
          CONNECT_DB   = '34025289d480802ba683de48f00e7c1c'

          today     = datetime.date.today()
          week_end  = (today + datetime.timedelta(days=7)).isoformat()
          today_str = today.isoformat()
          now_utc   = datetime.datetime.utcnow().isoformat() + 'Z'

          notion_h = {
            'Authorization': f'Bearer {NOTION_TOKEN}',
            'Notion-Version': '2022-06-28',
            'Content-Type': 'application/json'
          }

          # ── 1. LINEAR: In Progress issues ──────────────────────────────
          right_now = []
          if LINEAR_KEY:
            q = '''{ issues(filter:{state:{type:{in:["started"]}},team:{name:{eq:"Jerrunge"}}},first:30,orderBy:updatedAt){nodes{identifier title priority dueDate state{name type} labels{nodes{name}} project{name}}}}'''
            try:
              r = requests.post('https://api.linear.app/graphql',
                json={'query': q},
                headers={'Authorization': f'Bearer {LINEAR_KEY}', 'Content-Type': 'application/json'},
                timeout=15)
              issues = r.json().get('data',{}).get('issues',{}).get('nodes',[])
              p_map = {1:'urgent',2:'urgent',3:'week',4:'week',0:'week'}
              for issue in issues[:6]:
                if len(right_now) >= 3: break
                urgency = p_map.get(issue.get('priority',0),'week')
                dd = issue.get('dueDate','') or ''
                if dd and dd <= today_str: urgency = 'urgent'
                proj = (issue.get('project') or {}).get('name','')
                proj = proj.replace('💰 ','').replace('💼 ','').replace('⚙️ ','')
                right_now.append({'urgency':urgency,'text':issue['title'],'jer':issue['identifier'],'pillar':proj})
            except Exception as e:
              print(f'Linear error: {e}', file=sys.stderr)

          # ── 2. NOTION: Content due this week ───────────────────────────
          content_due = []
          if NOTION_TOKEN:
            try:
              r = requests.post(f'https://api.notion.com/v1/databases/{CONTENT_DB}/query',
                headers=notion_h,
                json={'filter':{'and':[
                  {'property':'Date','date':{'on_or_after':today_str}},
                  {'property':'Date','date':{'on_or_before':week_end}}
                ]},'sorts':[{'property':'Date','direction':'ascending'}]},
                timeout=15)
              for page in r.json().get('results',[])[:10]:
                props = page.get('properties',{})
                title = ''.join(t.get('plain_text','') for t in props.get('Name',props.get('Title',{})).get('title',[]))
                date_obj = (props.get('Date',{}).get('date') or {})
                due = date_obj.get('start','')[:10] if date_obj else ''
                plat_sel = props.get('Platform',{}).get('select') or {}
                platform = plat_sel.get('name','')
                # Status can be select or status type
                stat_obj = props.get('Status',{})
                stat_sel = stat_obj.get('status') or stat_obj.get('select') or {}
                status = stat_sel.get('name','') if isinstance(stat_sel,dict) else ''
                due_label = 'today' if due == today_str else ('tomorrow' if due == (today + datetime.timedelta(days=1)).isoformat() else due)
                if title:
                  content_due.append({'title':title,'platform':platform,'status':status,'due':due_label})
            except Exception as e:
              print(f'Notion content error: {e}', file=sys.stderr)

          # ── 3. NOTION: Follow-up radar ─────────────────────────────────
          follow_up = []
          if NOTION_TOKEN:
            try:
              r = requests.post(f'https://api.notion.com/v1/databases/{CONNECT_DB}/query',
                headers=notion_h,
                json={'filter':{'property':'Next Due','date':{'on_or_before':today_str}},
                      'sorts':[{'property':'Next Due','direction':'ascending'}],'page_size':6},
                timeout=15)
              for page in r.json().get('results',[])[:6]:
                props = page.get('properties',{})
                name = ''.join(t.get('plain_text','') for t in props.get('Name',{}).get('title',[]))
                lc = (props.get('Last Contacted',{}).get('date') or {})
                lc_str = (lc.get('start','') or '')[:10]
                days = (today - datetime.date.fromisoformat(lc_str)).days if lc_str else 0
                notes = ''.join(t.get('plain_text','') for t in props.get('Notes',{}).get('rich_text',[]))[:80]
                if name:
                  follow_up.append({'name':name,'days':days,'why':notes})
            except Exception as e:
              print(f'Notion connections error: {e}', file=sys.stderr)

          # ── 4. Write JSON ───────────────────────────────────────────────
          output = {
            'generated': now_utc,
            'generatedPT': '6:20 AM PT',
            'rightNow': right_now,
            'contentDue': content_due,
            'followUpRadar': follow_up,
            'socialPulse': {
              'substack':  {'subscribers': None, 'posts': None},
              'linkedin':  {'followers': None},
              'instagram': {'followers': None},
              'bluesky':   {'followers': None},
              'youtube':   {'subscribers': None}
            }
          }
          with open('daily-data.json','w') as f:
            json.dump(output, f, indent=2)
          print('daily-data.json written.')
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "dailybrief@jerrunge"
          git config user.name "Daily Brief Bot"
          git add daily-data.json
          git diff --staged --quiet || git commit -m "Daily brief — $(TZ=America/Los_Angeles date '+%a %b %-d, %Y')"
          git push
